<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Побег от статуса</title>
    <style>
      :root {
        --bg-1: #0b1327;
        --bg-2: #192f57;
        --panel: rgba(8, 12, 24, 0.65);
        --line: #2cd6ff;
        --text: #ebf1ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--text);
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 15% 15%, rgba(44, 214, 255, 0.2), transparent 30%),
          radial-gradient(circle at 90% 85%, rgba(255, 90, 137, 0.2), transparent 30%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
        overscroll-behavior: none;
      }
      .app {
        width: min(920px, 96vw);
        padding: 20px;
        border: 1px solid rgba(44, 214, 255, 0.5);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(4px);
        box-shadow: 0 18px 50px rgba(5, 8, 18, 0.45);
      }
      .hud {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.2rem, 1.7vw, 2rem);
        letter-spacing: 0.02em;
      }
      .stats { text-align: right; }
      .stats p { margin: 2px 0; }
      .game-wrap {
        display: grid;
        place-items: center;
        border: 1px solid rgba(44, 214, 255, 0.45);
        border-radius: 14px;
        overflow: hidden;
      }
      canvas {
        width: min(100%, 760px);
        height: auto;
        display: block;
        background: #0a0f1e;
        touch-action: none;
      }
      .controls {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .leaderboard {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid rgba(44, 214, 255, 0.4);
        border-radius: 12px;
        background: rgba(7, 13, 27, 0.45);
      }
      .leaderboard h2 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }
      .leaderboard ol {
        margin: 0;
        padding-left: 20px;
      }
      .leaderboard li {
        margin: 3px 0;
      }
      .leaderboard-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .leaderboard input {
        background: #0d1933;
        border: 1px solid rgba(44, 214, 255, 0.55);
        border-radius: 8px;
        color: #ebf1ff;
        padding: 8px 10px;
        width: 170px;
      }
      .small-btn {
        padding: 8px 10px;
      }
      .hint {
        margin: 8px 0 0;
        font-size: 0.86rem;
        color: #b8cbe7;
      }
      .start-gate {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid rgba(44, 214, 255, 0.5);
        border-radius: 12px;
        background: rgba(5, 10, 21, 0.75);
      }
      .start-gate h2 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }
      .start-gate-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .start-gate input {
        background: #0d1933;
        border: 1px solid rgba(44, 214, 255, 0.55);
        border-radius: 8px;
        color: #ebf1ff;
        padding: 8px 10px;
        width: 220px;
      }
      button {
        border: 1px solid var(--line);
        background: linear-gradient(120deg, #11234a, #16356f);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 0.95rem;
        cursor: pointer;
      }
      .mobile-controls {
        display: none;
        margin-top: 12px;
        width: 100%;
        justify-items: center;
        gap: 8px;
        user-select: none;
      }
      .mobile-row { display: flex; gap: 8px; }
      .dir-btn {
        width: 62px;
        height: 62px;
        font-size: 1.4rem;
        line-height: 1;
        border-radius: 12px;
        border: 1px solid rgba(44, 214, 255, 0.8);
        background: linear-gradient(145deg, rgba(17, 35, 74, 0.95), rgba(22, 53, 111, 0.95));
        color: #ebf1ff;
        touch-action: manipulation;
      }
      .dir-btn.active { transform: scale(0.98); filter: brightness(1.15); }
      @media (max-width: 720px) {
        .app {
          width: 100vw;
          min-height: 100vh;
          padding: 10px;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
        }
        .hud, .controls { flex-direction: column; align-items: flex-start; }
        .stats { text-align: left; }
        .mobile-controls { display: grid; }
        .start-gate, .leaderboard { padding: 10px; }
        canvas {
          width: 100%;
          max-height: 72vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Побег от статуса</h1>
        <div class="stats">
          <p id="coffeeLeft">Стаканчиков кофе осталось: 0</p>
          <p id="statusText">Статус: В игре</p>
        </div>
      </header>

      <section class="game-wrap">
        <canvas id="game" width="760" height="520" aria-label="Игра Побег от статуса"></canvas>
      </section>
      <section class="mobile-controls" aria-label="Мобильное управление">
        <button class="dir-btn" data-dir="up" type="button" aria-label="Вверх">▲</button>
        <div class="mobile-row">
          <button class="dir-btn" data-dir="left" type="button" aria-label="Влево">◀</button>
          <button class="dir-btn" data-dir="down" type="button" aria-label="Вниз">▼</button>
          <button class="dir-btn" data-dir="right" type="button" aria-label="Вправо">▶</button>
        </div>
      </section>

      <footer class="controls">
        <p>Управление: WASD/стрелки или кнопки снизу на телефоне</p>
        <div class="leaderboard-controls">
          <button id="pauseBtn" class="small-btn" type="button">Пауза</button>
          <button id="cheatBtn" class="small-btn" type="button">Чит-код</button>
          <button id="restartBtn" type="button">Начать заново</button>
        </div>
      </footer>
      <section id="startGate" class="start-gate">
        <h2>Перед стартом введи имя</h2>
        <div class="start-gate-controls">
          <input id="startNameInput" type="text" maxlength="20" placeholder="Имя игрока (2-20)" />
          <button id="startGameBtn" class="small-btn" type="button">Начать игру</button>
        </div>
        <p class="hint">Пока имя не введено, игра не запускается.</p>
      </section>
      <section class="leaderboard">
        <h2>Топ-10: Побег от статуса</h2>
        <ol id="leaderboardList"></ol>
        <p id="leaderboardHint" class="hint">Результат отправляется автоматически при завершении раунда.</p>
      </section>
    </main>

    <script>
      (function () {
        var TILE = 40;
        var LEVELS = [
          [
            "###################",
            "#P....#.....#....E#",
            "#.##.#.###.#.##.#.#",
            "#..C.#.....#....#.#",
            "#.####.###.####.#.#",
            "#......#.#......#.#",
            "#.####.#.#.####.#.#",
            "#...#......#...#..#",
            "###.#.####.#.#.####",
            "#...#....#...#....#",
            "#.#.####.#.####.#.#",
            "#.#......#..C...#.#",
            "#.######.#.######.#",
            "#E................#",
            "###################"
          ],
          [
            "###################",
            "#P..#....#...#....#",
            "#.#.#.##.#.#.#.##E#",
            "#.#...#..#.#...#.C#",
            "#.###.#.##.###.#.##",
            "#...#.#....#...#..#",
            "###.#.####.#.###.##",
            "#...#....#.#...#..#",
            "#.#.##.#.#.###.#.##",
            "#.#....#...#...#..#",
            "#.####.#####.#.##.#",
            "#...#..E.....#..C.#",
            "#.#.#####.###.###.#",
            "#....E....#.......#",
            "###################"
          ],
          [
            "###################",
            "#P....#....S......#",
            "#.##.#.#.#####.##.#",
            "#....#.#.....#....#",
            "###.##.###.#.##.###",
            "#...#....#.#....#.#",
            "#.#.#.##.#.##.#.#.#",
            "#.#...#..B..#...#.#",
            "#.###.#.###.#.###.#",
            "#.....#..S..#.....#",
            "###.#.#####.#.#.###",
            "#...#...#...#.#...#",
            "#.#####.#.#####.#.#",
            "#......S..........#",
            "###################"
          ]
        ];
        var MAP = LEVELS[0];

        var canvas = document.getElementById("game");
        var ctx = canvas.getContext("2d");
        var coffeeLeftEl = document.getElementById("coffeeLeft");
        var statusTextEl = document.getElementById("statusText");
        var restartBtn = document.getElementById("restartBtn");
        var pauseBtn = document.getElementById("pauseBtn");
        var cheatBtn = document.getElementById("cheatBtn");
        var startGate = document.getElementById("startGate");
        var startNameInput = document.getElementById("startNameInput");
        var startGameBtn = document.getElementById("startGameBtn");
        var leaderboardList = document.getElementById("leaderboardList");
        var leaderboardHint = document.getElementById("leaderboardHint");
        var dirButtons = document.querySelectorAll(".dir-btn");
        var API_BASE = "https://d5do84mn631if2vsbgrq.z7jmlavt.apigw.yandexcloud.net";
        var NAME_KEY = "pobeg_player_name";
        var currentPlayerName = "";
        var gameStarted = false;
        var currentLevelIndex = 0;
        var livesLeft = 3;
        var totalScore = 0;
        var lastFrameTime = 0;
        var logicAccumulatorMs = 0;
        var FIXED_STEP_MS = 1000 / 60;
        var MAX_STEPS_PER_FRAME = 5;
        var cheatNoDeath = false;
        var cheatUsedThisRun = false;
        var isPaused = false;
        var BOSS_NAME = "МойОфис";

        var WIDTH = MAP[0].length;
        var HEIGHT = MAP.length;
        canvas.width = WIDTH * TILE;
        canvas.height = HEIGHT * TILE;

        var DIRECTIONS = [
          { x: 1, y: 0 },
          { x: -1, y: 0 },
          { x: 0, y: 1 },
          { x: 0, y: -1 }
        ];

        var svgParts = [
          "<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'>",
          "<defs><linearGradient id='cup' x1='0' y1='0' x2='0' y2='1'>",
          "<stop offset='0%' stop-color='#f8f4ec'/><stop offset='100%' stop-color='#e7ddcf'/></linearGradient>",
          "<linearGradient id='lid' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='#f6f2ea'/><stop offset='100%' stop-color='#d5ccbf'/></linearGradient></defs>",
          "<ellipse cx='32' cy='56' rx='17' ry='5' fill='rgba(0,0,0,0.17)'/>",
          "<rect x='19' y='13' width='26' height='9' rx='3' fill='url(#lid)'/>",
          "<path d='M22 20 L42 20 L39 50 Q32 53 25 50 Z' fill='url(#cup)' stroke='#fff' stroke-width='1.2'/>",
          "<rect x='24' y='28' width='16' height='12' rx='2' fill='#2fa56f'/>",
          "<circle cx='32' cy='34' r='4.5' fill='#f7f7f7' opacity='0.85'/><circle cx='32' cy='34' r='2.3' fill='#2fa56f'/>",
          "</svg>"
        ];
        var cupImage = new Image();
        var cupLoaded = false;
        cupImage.onload = function () { cupLoaded = true; };
        cupImage.src = "data:image/svg+xml;utf8," + encodeURIComponent(svgParts.join(""));

        var state = null;

        function getCurrentScore() {
          return totalScore;
        }

        function setHint(text, isError) {
          leaderboardHint.textContent = text;
          leaderboardHint.style.color = isError ? "#ff9cb8" : "#b8cbe7";
        }

        function savePlayerName(name) {
          if (name.length >= 2 && name.length <= 20) {
            localStorage.setItem(NAME_KEY, name);
          }
        }

        function loadPlayerName() {
          var saved = localStorage.getItem(NAME_KEY) || "";
          if (saved) startNameInput.value = saved;
        }

        function startGameSession() {
          var name = (startNameInput.value || "").trim();
          if (name.length < 2 || name.length > 20) {
            setHint("Имя: от 2 до 20 символов", true);
            return;
          }
          currentPlayerName = name;
          savePlayerName(name);
          gameStarted = true;
          startGate.style.display = "none";
          setHint("Игрок: " + name, false);
          startNewGame();
        }

        function drawWaitingScreen() {
          ctx.fillStyle = "#0a0f1e";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#eaf1ff";
          ctx.font = "bold 30px Avenir Next, Trebuchet MS, sans-serif";
          ctx.fillText("Введи имя и нажми 'Начать игру'", 120, canvas.height / 2 - 10);
          ctx.font = "20px Avenir Next, Trebuchet MS, sans-serif";
          ctx.fillStyle = "#87c9ff";
          ctx.fillText("Результат отправляется автоматически после раунда", 130, canvas.height / 2 + 28);
        }

        function renderLeaderboard(items) {
          var i, li;
          leaderboardList.innerHTML = "";
          if (!items || !items.length) {
            li = document.createElement("li");
            li.textContent = "Пока пусто";
            leaderboardList.appendChild(li);
            return;
          }
          for (i = 0; i < items.length; i += 1) {
            li = document.createElement("li");
            li.textContent = items[i].name + " — " + items[i].score;
            leaderboardList.appendChild(li);
          }
        }

        function fetchLeaderboard() {
          return fetch(API_BASE + "/leaderboard")
            .then(function (res) { return res.json(); })
            .then(function (data) {
              renderLeaderboard(data.items || []);
            })
            .catch(function () {
              setHint("Не удалось загрузить топ-10", true);
            });
        }

        function submitScore(autoMode) {
          var name = currentPlayerName;
          var score = getCurrentScore();
          if (cheatUsedThisRun) {
            setHint("В этом раунде использовался чит: результат не отправляется", true);
            return Promise.resolve();
          }
          if (name.length < 2 || name.length > 20) {
            if (!autoMode) setHint("Имя: от 2 до 20 символов", true);
            return Promise.resolve();
          }
          if (!state || score <= 0) {
            if (!autoMode) setHint("Сначала набери очки в игре", true);
            return Promise.resolve();
          }
          if (state.sentScore) return Promise.resolve();

          return fetch(API_BASE + "/score", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name, score: score })
          })
            .then(function (res) {
              return res.text().then(function (txt) {
                if (!res.ok) throw new Error(txt || ("HTTP " + res.status));
                state.sentScore = true;
                setHint("Результат отправлен: " + score, false);
                return fetchLeaderboard();
              });
            })
            .catch(function (err) {
              setHint("Ошибка отправки: " + (err && err.message ? err.message : "unknown"), true);
            });
        }

        function showFatal(msg) {
          statusTextEl.textContent = "Ошибка: " + msg;
          statusTextEl.style.color = "#ff8ab0";
          ctx.fillStyle = "#0a0f1e";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#ff8ab0";
          ctx.font = "20px sans-serif";
          ctx.fillText("Ошибка запуска игры", 20, 40);
          ctx.fillStyle = "#eaf1ff";
          ctx.font = "16px sans-serif";
          ctx.fillText("Открой файл в Safari/Chrome", 20, 68);
        }

        function buildStateFromMap() {
          var cups = {};
          var croissants = {};
          var seals = {};
          var enemies = [];
          var player = { x: 1, y: 1, dirX: 0, dirY: 0, nextDirX: 0, nextDirY: 0 };
          var spawnPlayer = { x: 1, y: 1 };
          var spawnEnemies = [];
          var boss = null;
          var bossSpawn = null;
          var y, x, cell;

          for (y = 0; y < HEIGHT; y += 1) {
            for (x = 0; x < WIDTH; x += 1) {
              cell = MAP[y].charAt(x);
              if (cell === ".") cups[x + "," + y] = true;
              if (cell === "C") croissants[x + "," + y] = true;
              if (cell === "S") seals[x + "," + y] = true;
              if (cell === "P") {
                player.x = x;
                player.y = y;
                spawnPlayer = { x: x, y: y };
              }
              if (cell === "E") {
                enemies.push({ x: x, y: y, dirX: 0, dirY: 0, active: true, respawnMs: 0 });
                spawnEnemies.push({ x: x, y: y });
              }
              if (cell === "B") {
                boss = {
                  x: x,
                  y: y,
                  spawnX: x,
                  spawnY: y,
                  dirX: 0,
                  dirY: 0,
                  hp: 3,
                  active: true,
                  vulnerableMs: 0,
                  dashCdMs: 3000,
                  justHitMs: 0
                };
                bossSpawn = { x: x, y: y };
              }
            }
          }

          state = {
            player: player,
            enemies: enemies,
            spawnPlayer: spawnPlayer,
            spawnEnemies: spawnEnemies,
            boss: boss,
            bossSpawn: bossSpawn,
            cups: cups,
            croissants: croissants,
            seals: seals,
            sealRespawnMs: 0,
            cupsCount: Object.keys(cups).length,
            gameOver: false,
            won: false,
            levelCompleteMessageTimer: 0,
            playerAccMs: 0,
            enemyAccMs: 0,
            playerMoveMs: 125,
            enemyMoveMs: 190 - currentLevelIndex * 25,
            invulnMs: 0,
            frightenedMs: 0,
            pulse: 0,
            sentScore: false
          };

          updateHud();
        }

        function loadLevel(levelIndex) {
          currentLevelIndex = levelIndex;
          MAP = LEVELS[levelIndex];
          buildStateFromMap();
          state.levelCompleteMessageTimer = 1200;
          state.enemyMoveMs = Math.max(110, 190 - currentLevelIndex * 25);
          state.playerMoveMs = Math.max(90, 125 - currentLevelIndex * 10);
          updateHud();
        }

        function startNewGame() {
          currentLevelIndex = 0;
          livesLeft = 3;
          totalScore = 0;
          lastFrameTime = 0;
          logicAccumulatorMs = 0;
          cheatNoDeath = false;
          cheatUsedThisRun = false;
          isPaused = false;
          pauseBtn.textContent = "Пауза";
          loadLevel(0);
        }

        function cupsLeft() {
          return Object.keys(state.cups).length;
        }

        function isWall(x, y) {
          if (x < 0 || y < 0 || x >= WIDTH || y >= HEIGHT) return true;
          return MAP[y].charAt(x) === "#";
        }

        function setDirection(dx, dy) {
          if (!gameStarted || !state || state.gameOver) return;
          state.player.nextDirX = dx;
          state.player.nextDirY = dy;
        }

        function tryMove(entity, dx, dy) {
          var nx = entity.x + dx;
          var ny = entity.y + dy;
          if (isWall(nx, ny)) return false;
          entity.x = nx;
          entity.y = ny;
          return true;
        }

        function updatePlayer() {
          var p = state.player;
          var key;

          if (!isWall(p.x + p.nextDirX, p.y + p.nextDirY)) {
            p.dirX = p.nextDirX;
            p.dirY = p.nextDirY;
          }
          if (p.dirX !== 0 || p.dirY !== 0) tryMove(p, p.dirX, p.dirY);

          key = p.x + "," + p.y;
          if (state.cups[key]) {
            delete state.cups[key];
            totalScore += 1;
            if (cupsLeft() === 0) {
              if (state.boss && state.boss.active) {
                setHint("Стаканчики собраны. Добей босса " + BOSS_NAME, false);
                return;
              }
              if (currentLevelIndex < LEVELS.length - 1) {
                loadLevel(currentLevelIndex + 1);
                setHint("Уровень " + (currentLevelIndex + 1) + " пройден. Переход на следующий.", false);
                return;
              }
              state.won = true;
              state.gameOver = true;
            }
          }

          if (state.croissants[key]) {
            delete state.croissants[key];
            state.frightenedMs = 7000;
            totalScore += 5;
            setHint("Круассан съеден: статусы уязвимы", false);
          }

          if (state.seals[key]) {
            delete state.seals[key];
            totalScore += 10;
            if (state.boss && state.boss.active) {
              state.boss.vulnerableMs = 5000;
              if (Object.keys(state.seals).length === 0 && state.boss.hp > 1) {
                state.sealRespawnMs = 9000;
              }
              setHint("Печать активирована: " + BOSS_NAME + " уязвим", false);
            }
          }
        }

        function nextEnemyStep(enemy) {
          var player = state.player;
          var possible = [];
          var i, dir, nx, ny, source, rnd;

          for (i = 0; i < DIRECTIONS.length; i += 1) {
            dir = DIRECTIONS[i];
            nx = enemy.x + dir.x;
            ny = enemy.y + dir.y;
            if (!isWall(nx, ny)) {
              possible.push({
                x: dir.x,
                y: dir.y,
                score: Math.abs(nx - player.x) + Math.abs(ny - player.y)
              });
            }
          }

          if (!possible.length) return { x: 0, y: 0 };

          if (Math.random() < 0.72) {
            possible.sort(function (a, b) { return a.score - b.score; });
            return { x: possible[0].x, y: possible[0].y };
          }

          source = possible.filter(function (o) {
            return !(o.x === -enemy.dirX && o.y === -enemy.dirY);
          });
          if (!source.length) source = possible;
          rnd = source[Math.floor(Math.random() * source.length)];
          return { x: rnd.x, y: rnd.y };
        }

        function updateEnemies() {
          var i, enemy, next;

          for (i = 0; i < state.enemies.length; i += 1) {
            enemy = state.enemies[i];
            if (!enemy.active) continue;
            next = nextEnemyStep(enemy);
            enemy.dirX = next.x;
            enemy.dirY = next.y;
            tryMove(enemy, enemy.dirX, enemy.dirY);
          }
        }

        function activeEnemyCount() {
          var i, count = 0;
          for (i = 0; i < state.enemies.length; i += 1) {
            if (state.enemies[i].active) count += 1;
          }
          return count;
        }

        function findFarthestRespawnPoint() {
          var candidates = [
            { x: 1, y: 1 },
            { x: WIDTH - 2, y: 1 },
            { x: 1, y: HEIGHT - 2 },
            { x: WIDTH - 2, y: HEIGHT - 2 }
          ];
          var best = null;
          var bestDist = -1;
          var i, c, dist;
          for (i = 0; i < candidates.length; i += 1) {
            c = candidates[i];
            if (isWall(c.x, c.y)) continue;
            dist = Math.abs(c.x - state.player.x) + Math.abs(c.y - state.player.y);
            if (dist > bestDist) {
              bestDist = dist;
              best = c;
            }
          }
          return best || state.spawnPlayer;
        }

        function eatEnemy(enemy) {
          var spot = findFarthestRespawnPoint();
          enemy.active = false;
          enemy.respawnMs = 3500;
          enemy.dirX = 0;
          enemy.dirY = 0;
          enemy.respawnX = spot.x;
          enemy.respawnY = spot.y;
          totalScore += 25;
        }

        function hitBoss() {
          var spot = findFarthestRespawnPoint();
          var prevHp = state.boss.hp;
          state.boss.hp -= 1;
          state.boss.justHitMs = 900;
          state.boss.vulnerableMs = 0;
          state.boss.x = spot.x;
          state.boss.y = spot.y;
          state.boss.dirX = 0;
          state.boss.dirY = 0;
          totalScore += 60;
          setHint(BOSS_NAME + " получил удар. HP: " + state.boss.hp, false);
          if ((prevHp === 3 || prevHp === 2) && activeEnemyCount() < 8) {
            spawnStatusAtFarthest();
            setHint(BOSS_NAME + " усилился и вызвал статус", true);
          }
          if (state.boss.hp <= 0) {
            state.boss.active = false;
            totalScore += 150;
            state.won = true;
            state.gameOver = true;
            setHint("Босс " + BOSS_NAME + " побежден!", false);
          }
        }

        function spawnStatusAtFarthest() {
          var spot = findFarthestRespawnPoint();
          state.enemies.push({ x: spot.x, y: spot.y, dirX: 0, dirY: 0, active: true, respawnMs: 0 });
          state.spawnEnemies.push({ x: spot.x, y: spot.y });
        }

        function resolveEnemyContact() {
          var i, enemy;
          if (!state) return false;
          for (i = 0; i < state.enemies.length; i += 1) {
            enemy = state.enemies[i];
            if (!enemy.active) continue;
            if (enemy.x !== state.player.x || enemy.y !== state.player.y) continue;
            if (state.frightenedMs > 0) {
              eatEnemy(enemy);
              continue;
            }
            if (!cheatNoDeath && state.invulnMs <= 0) {
              return true;
            }
          }
          if (state.boss && state.boss.active && state.boss.x === state.player.x && state.boss.y === state.player.y) {
            if (state.boss.vulnerableMs > 0) {
              hitBoss();
              return false;
            }
            if (!cheatNoDeath && state.invulnMs <= 0 && state.boss.justHitMs <= 0) {
              return true;
            }
          }
          return false;
        }

        function updateEnemyRespawns(dt) {
          var i, enemy;
          for (i = 0; i < state.enemies.length; i += 1) {
            enemy = state.enemies[i];
            if (enemy.active) continue;
            enemy.respawnMs -= dt;
            if (enemy.respawnMs <= 0) {
              enemy.active = true;
              enemy.x = enemy.respawnX;
              enemy.y = enemy.respawnY;
            }
          }
        }

        function updateSeals(dt) {
          var spot, key;
          if (!state.boss || !state.boss.active) return;
          if (state.boss.hp <= 0) return;
          if (Object.keys(state.seals).length > 0) return;
          if (state.boss.vulnerableMs > 0) return;
          if (state.sealRespawnMs <= 0) state.sealRespawnMs = 9000;
          state.sealRespawnMs -= dt;
          if (state.sealRespawnMs > 0) return;
          spot = findFarthestRespawnPoint();
          key = spot.x + "," + spot.y;
          state.seals[key] = true;
          state.sealRespawnMs = 0;
          setHint("Появилась новая печать для босса", false);
        }

        function updateBossTimers(dt) {
          if (!state.boss || !state.boss.active) return;
          if (state.boss.vulnerableMs > 0) state.boss.vulnerableMs -= dt;
          if (state.boss.dashCdMs > 0) state.boss.dashCdMs -= dt;
          if (state.boss.justHitMs > 0) state.boss.justHitMs -= dt;
        }

        function updateBossStep() {
          var boss, next, phase;
          if (!state.boss || !state.boss.active) return;
          boss = state.boss;
          phase = boss.hp >= 3 ? 1 : (boss.hp === 2 ? 2 : 3);

          next = nextEnemyStep(boss);
          boss.dirX = next.x;
          boss.dirY = next.y;
          tryMove(boss, boss.dirX, boss.dirY);

          if (phase >= 2 && boss.dashCdMs <= 0) {
            tryMove(boss, boss.dirX, boss.dirY);
            boss.dashCdMs = phase === 2 ? 2600 : 2100;
          }

        }

        function resetActorsAfterHit() {
          var i;
          state.player.x = state.spawnPlayer.x;
          state.player.y = state.spawnPlayer.y;
          state.player.dirX = 0;
          state.player.dirY = 0;
          state.player.nextDirX = 0;
          state.player.nextDirY = 0;
          for (i = 0; i < state.enemies.length; i += 1) {
            state.enemies[i].x = state.spawnEnemies[i].x;
            state.enemies[i].y = state.spawnEnemies[i].y;
            state.enemies[i].dirX = 0;
            state.enemies[i].dirY = 0;
            state.enemies[i].active = true;
            state.enemies[i].respawnMs = 0;
          }
          if (state.boss && state.boss.active) {
            state.boss.x = state.boss.spawnX;
            state.boss.y = state.boss.spawnY;
            state.boss.dirX = 0;
            state.boss.dirY = 0;
            state.boss.vulnerableMs = 0;
            state.boss.justHitMs = 0;
          }
          state.playerAccMs = 0;
          state.enemyAccMs = 0;
          state.invulnMs = 1200;
        }

        function loseLifeOrGame() {
          if (cheatNoDeath) return;
          livesLeft -= 1;
          if (livesLeft <= 0) {
            livesLeft = 0;
            state.gameOver = true;
            state.won = false;
            setHint("Игра окончена. Все жизни закончились.", true);
            return;
          }
          resetActorsAfterHit();
          setHint("Минус жизнь. Осталось: " + livesLeft, true);
        }

        function updateHud() {
          var hearts = "";
          var bossHp = "";
          var i;
          for (i = 0; i < 3; i += 1) hearts += i < livesLeft ? "❤️" : "🖤";
          if (state && state.boss && state.boss.active) {
            for (i = 0; i < state.boss.hp; i += 1) bossHp += "🟥";
            coffeeLeftEl.textContent = "Ур: " + (currentLevelIndex + 1) + " | Жизни: " + hearts + " | " + BOSS_NAME + " HP: " + bossHp + " | Печати: " + Object.keys(state.seals).length + " | Очки: " + getCurrentScore();
          } else {
            coffeeLeftEl.textContent = "Ур: " + (currentLevelIndex + 1) + " | Жизни: " + hearts + " | Стаканчиков: " + (state ? cupsLeft() : 0) + " | Очки: " + getCurrentScore();
          }
          if (!state || !state.gameOver) {
            statusTextEl.textContent = "Статус: В игре";
            statusTextEl.style.color = "#ebf1ff";
            return;
          }
          if (state.won) {
            statusTextEl.textContent = "Статус: Победа. Все уровни пройдены";
            statusTextEl.style.color = "#7effb1";
          } else {
            statusTextEl.textContent = "Статус: Поражение";
            statusTextEl.style.color = "#ff8ab0";
          }
        }

        function drawWall(x, y) {
          var px = x * TILE;
          var py = y * TILE;
          if (currentLevelIndex === 0) ctx.fillStyle = "#112045";
          else if (currentLevelIndex === 1) ctx.fillStyle = "#18331b";
          else ctx.fillStyle = "#3a2516";
          ctx.fillRect(px, py, TILE, TILE);
          if (currentLevelIndex === 0) ctx.strokeStyle = "#2cd6ff";
          else if (currentLevelIndex === 1) ctx.strokeStyle = "#66ff9b";
          else ctx.strokeStyle = "#ffb37a";
          ctx.lineWidth = 1;
          ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
        }

        function drawCup(x, y) {
          var px = x * TILE;
          var py = y * TILE;
          var bob = Math.sin(state.pulse + x * 0.35 + y * 0.22) * 2;
          var drawX = px + 8;
          var drawY = py + 6 + bob;

          ctx.fillStyle = "rgba(47, 165, 111, 0.22)";
          if (typeof ctx.ellipse === "function") {
            ctx.beginPath();
            ctx.ellipse(px + TILE / 2, py + TILE - 6, 10, 4, 0, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(px + 10, py + TILE - 9, 20, 6);
          }

          if (cupLoaded) {
            ctx.drawImage(cupImage, drawX, drawY, 24, 28);
          } else {
            ctx.fillStyle = "#f5efe4";
            ctx.fillRect(drawX + 3, drawY + 4, 18, 22);
            ctx.fillStyle = "#2fa56f";
            ctx.fillRect(drawX + 6, drawY + 12, 12, 8);
          }
        }

        function drawCroissant(x, y) {
          var px = x * TILE;
          var py = y * TILE;
          var bob = Math.sin(state.pulse + x * 0.3 + y * 0.21) * 1.6;
          var cx = px + TILE / 2;
          var cy = py + TILE / 2 + bob;
          ctx.fillStyle = "#e8b46a";
          ctx.beginPath();
          ctx.arc(cx - 4, cy, 7, Math.PI * 0.15, Math.PI * 1.85);
          ctx.fill();
          ctx.fillStyle = "#f3d08f";
          ctx.beginPath();
          ctx.arc(cx - 1, cy, 4.5, Math.PI * 0.2, Math.PI * 1.8);
          ctx.fill();
        }

        function drawSeal(x, y) {
          var px = x * TILE;
          var py = y * TILE;
          var cx = px + TILE / 2;
          var cy = py + TILE / 2 + Math.sin(state.pulse + x * 0.4) * 1.2;
          ctx.fillStyle = "#8cc8ff";
          ctx.beginPath();
          ctx.moveTo(cx, cy - 8);
          ctx.lineTo(cx + 3, cy - 2);
          ctx.lineTo(cx + 9, cy - 1);
          ctx.lineTo(cx + 4, cy + 3);
          ctx.lineTo(cx + 6, cy + 9);
          ctx.lineTo(cx, cy + 5);
          ctx.lineTo(cx - 6, cy + 9);
          ctx.lineTo(cx - 4, cy + 3);
          ctx.lineTo(cx - 9, cy - 1);
          ctx.lineTo(cx - 3, cy - 2);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "#d7ecff";
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }

        function drawPlayer() {
          var p = state.player;
          var px = p.x * TILE;
          var py = p.y * TILE;
          var dirX = p.nextDirX || p.dirX;
          var dirY = p.nextDirY || p.dirY;

          ctx.fillStyle = "rgba(32, 230, 255, 0.2)";
          ctx.beginPath();
          ctx.arc(px + TILE / 2, py + TILE / 2 + 11, 14, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#f4d0b4";
          ctx.beginPath();
          ctx.arc(px + TILE / 2, py + 10, 7, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#2c2f3f";
          ctx.fillRect(px + 12, py + 16, 16, 14);
          ctx.fillStyle = "#1a233b";
          ctx.fillRect(px + 12, py + 18, 16, 16);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(px + 15, py + 20, 10, 10);

          ctx.fillStyle = "#ff5a89";
          ctx.beginPath();
          ctx.moveTo(px + 20, py + 21);
          ctx.lineTo(px + 17, py + 28);
          ctx.lineTo(px + 20, py + 34);
          ctx.lineTo(px + 23, py + 28);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#1f2f57";
          ctx.fillRect(px + 9, py + 19, 3, 12);
          ctx.fillRect(px + 28, py + 19, 3, 12);

          if (dirX !== 0 || dirY !== 0) {
            ctx.fillStyle = "#f4d0b4";
            ctx.beginPath();
            ctx.arc(px + 20 + dirX * 10, py + 24 + dirY * 6, 3, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = "#3f2f24";
          if (dirX >= 0) ctx.fillRect(px + 27, py + 24, 7, 9);
          else ctx.fillRect(px + 6, py + 24, 7, 9);

          ctx.fillStyle = "#141824";
          ctx.fillRect(px + 14, py + 34, 5, 6);
          ctx.fillRect(px + 21, py + 34, 5, 6);
        }

        function drawEnemy(enemy) {
          if (!enemy.active) return;
          var px = enemy.x * TILE;
          var py = enemy.y * TILE;
          var i;
          var blink = state.frightenedMs > 0 && Math.floor(state.frightenedMs / 180) % 2 === 0;
          if (state.frightenedMs > 0) ctx.fillStyle = blink ? "#ffed8f" : "#8fd8ff";
          else ctx.fillStyle = "#fffefb";
          ctx.fillRect(px + 7, py + 5, TILE - 14, TILE - 10);
          if (state.frightenedMs > 0) ctx.strokeStyle = "#2e4b76";
          else ctx.strokeStyle = "#ff5a89";
          ctx.lineWidth = 2;
          ctx.strokeRect(px + 7, py + 5, TILE - 14, TILE - 10);
          if (state.frightenedMs > 0) ctx.fillStyle = "#2e4b76";
          else ctx.fillStyle = "#ff5a89";
          for (i = 0; i < 3; i += 1) ctx.fillRect(px + 11, py + 12 + i * 8, TILE - 22, 3);
        }

        function drawBoss() {
          var boss, px, py, size, blink;
          if (!state.boss || !state.boss.active) return;
          boss = state.boss;
          px = boss.x * TILE;
          py = boss.y * TILE;
          size = Math.floor(TILE * 1.55);
          px = px + TILE / 2 - size / 2;
          py = py + TILE / 2 - size / 2;

          blink = boss.vulnerableMs > 0 && Math.floor(boss.vulnerableMs / 150) % 2 === 0;
          ctx.fillStyle = boss.vulnerableMs > 0 ? (blink ? "#b7ff94" : "#d8ffc6") : "#70d87a";
          ctx.fillRect(px, py, size, size);
          ctx.strokeStyle = boss.vulnerableMs > 0 ? "#2d6a34" : "#2f7a3a";
          ctx.lineWidth = 3;
          ctx.strokeRect(px, py, size, size);
          ctx.fillStyle = "#1f4f28";
          ctx.font = "bold 12px Trebuchet MS, sans-serif";
          ctx.fillText(BOSS_NAME, px + 4, py + 14);
          ctx.fillStyle = boss.vulnerableMs > 0 ? "#2d6a34" : "#23622f";
          ctx.fillRect(px + 8, py + size - 16, size - 16, 6);
        }

        function drawOverlay() {
          var title, subtitle;
          if (!state.gameOver) return;
          ctx.fillStyle = "rgba(7, 10, 20, 0.7)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = state.won ? "#7effb1" : "#ff7fa8";
          ctx.font = "bold 54px Avenir Next, Trebuchet MS, sans-serif";
          title = state.won ? "ПОБЕДА" : "ПОРАЖЕНИЕ";
          ctx.fillText(title, canvas.width / 2 - ctx.measureText(title).width / 2, canvas.height / 2 - 20);
          ctx.fillStyle = "#eaf1ff";
          ctx.font = "24px Avenir Next, Trebuchet MS, sans-serif";
          subtitle = state.won ? "Ты прошел все уровни" : "Закончились жизни";
          ctx.fillText(subtitle, canvas.width / 2 - ctx.measureText(subtitle).width / 2, canvas.height / 2 + 24);
        }

        function render() {
          var x, y, keys, i, parts;
          ctx.fillStyle = "#0a0f1e";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          for (y = 0; y < HEIGHT; y += 1) {
            for (x = 0; x < WIDTH; x += 1) {
              if (MAP[y].charAt(x) === "#") drawWall(x, y);
            }
          }

          keys = Object.keys(state.cups);
          for (i = 0; i < keys.length; i += 1) {
            parts = keys[i].split(",");
            drawCup(parseInt(parts[0], 10), parseInt(parts[1], 10));
          }

          keys = Object.keys(state.croissants);
          for (i = 0; i < keys.length; i += 1) {
            parts = keys[i].split(",");
            drawCroissant(parseInt(parts[0], 10), parseInt(parts[1], 10));
          }

          keys = Object.keys(state.seals);
          for (i = 0; i < keys.length; i += 1) {
            parts = keys[i].split(",");
            drawSeal(parseInt(parts[0], 10), parseInt(parts[1], 10));
          }

          for (i = 0; i < state.enemies.length; i += 1) drawEnemy(state.enemies[i]);
          drawBoss();
          drawPlayer();
          drawOverlay();
          if (isPaused) {
            ctx.fillStyle = "rgba(6, 10, 18, 0.65)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#eaf1ff";
            ctx.font = "bold 46px Avenir Next, Trebuchet MS, sans-serif";
            ctx.fillText("ПАУЗА", canvas.width / 2 - 90, canvas.height / 2 - 8);
            ctx.font = "20px Avenir Next, Trebuchet MS, sans-serif";
            ctx.fillText("Нажми P или кнопку 'Пауза'", canvas.width / 2 - 150, canvas.height / 2 + 28);
          }
        }

        function advanceGame(dt) {
          var wasGameOver = state.gameOver;
          state.pulse += 0.08 * (dt / 16.67);
          if (!state.gameOver) {
            state.playerAccMs += dt;
            state.enemyAccMs += dt;
            if (state.invulnMs > 0) state.invulnMs -= dt;
            if (state.frightenedMs > 0) state.frightenedMs -= dt;
            updateEnemyRespawns(dt);
            updateBossTimers(dt);
            updateSeals(dt);

            while (state.playerAccMs >= state.playerMoveMs && !state.gameOver) {
              state.playerAccMs -= state.playerMoveMs;
              updatePlayer();
              if (resolveEnemyContact()) loseLifeOrGame();
            }
            while (state.enemyAccMs >= state.enemyMoveMs && !state.gameOver) {
              state.enemyAccMs -= state.enemyMoveMs;
              updateEnemies();
              updateBossStep();
              if (resolveEnemyContact()) loseLifeOrGame();
            }
            updateHud();
          }
          if (!wasGameOver && state.gameOver) {
            submitScore(true);
          }
        }

        function loop(timestamp) {
          var now, dt, steps;
          if (!gameStarted || !state) {
            drawWaitingScreen();
            lastFrameTime = timestamp || 0;
            window.requestAnimationFrame(loop);
            return;
          }
          if (isPaused) {
            lastFrameTime = (typeof performance !== "undefined" && performance.now) ? performance.now() : (timestamp || Date.now());
            logicAccumulatorMs = 0;
            render();
            window.requestAnimationFrame(loop);
            return;
          }
          now = (typeof performance !== "undefined" && performance.now) ? performance.now() : (timestamp || Date.now());
          if (!lastFrameTime) lastFrameTime = now;
          dt = now - lastFrameTime;
          lastFrameTime = now;
          dt = Math.max(0, Math.min(100, dt));
          logicAccumulatorMs += dt;

          steps = 0;
          while (logicAccumulatorMs >= FIXED_STEP_MS && steps < MAX_STEPS_PER_FRAME) {
            advanceGame(FIXED_STEP_MS);
            logicAccumulatorMs -= FIXED_STEP_MS;
            steps += 1;
          }
          if (steps === MAX_STEPS_PER_FRAME) {
            logicAccumulatorMs = 0;
          }

          render();
          window.requestAnimationFrame(loop);
        }

        function applyDirByName(name) {
          if (name === "up") setDirection(0, -1);
          if (name === "down") setDirection(0, 1);
          if (name === "left") setDirection(-1, 0);
          if (name === "right") setDirection(1, 0);
        }

        function bindDirButton(btn) {
          var dir = btn.getAttribute("data-dir");
          var press = function (e) {
            if (e && e.preventDefault) e.preventDefault();
            btn.classList.add("active");
            applyDirByName(dir);
          };
          var release = function () {
            btn.classList.remove("active");
          };

          btn.addEventListener("touchstart", press, false);
          btn.addEventListener("touchend", release, false);
          btn.addEventListener("touchcancel", release, false);
          btn.addEventListener("mousedown", press, false);
          btn.addEventListener("mouseup", release, false);
          btn.addEventListener("mouseleave", release, false);
        }

        function handleKeyboardDirection(event) {
          var key = (event.key || "").toLowerCase();
          var code = event.code || "";
          var handled = false;

          if (key === "arrowup" || key === "w" || code === "KeyW") {
            setDirection(0, -1);
            handled = true;
          }
          if (key === "arrowdown" || key === "s" || code === "KeyS") {
            setDirection(0, 1);
            handled = true;
          }
          if (key === "arrowleft" || key === "a" || code === "KeyA") {
            setDirection(-1, 0);
            handled = true;
          }
          if (key === "arrowright" || key === "d" || code === "KeyD") {
            setDirection(1, 0);
            handled = true;
          }

          if (handled && gameStarted) {
            event.preventDefault();
          }
          if ((key === "p" || code === "KeyP") && gameStarted) {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? "Продолжить" : "Пауза";
            if (isPaused) setHint("Пауза включена", false);
            else setHint("Игра продолжена", false);
            event.preventDefault();
          }
        }

        function tryActivateCheat() {
          var code = window.prompt("Введи чит-код:");
          if (String(code || "").trim() === "1874") {
            cheatNoDeath = !cheatNoDeath;
            cheatUsedThisRun = true;
            if (cheatNoDeath) setHint("Чит включен: бессмертие активно", false);
            else setHint("Чит выключен: бессмертие отключено", true);
            return;
          }
          setHint("Неверный чит-код", true);
        }

        window.addEventListener("keydown", handleKeyboardDirection, false);
        document.addEventListener("keydown", handleKeyboardDirection, false);

        restartBtn.addEventListener("click", function () {
          if (!gameStarted) return;
          startNewGame();
        }, false);
        pauseBtn.addEventListener("click", function () {
          if (!gameStarted || !state || state.gameOver) return;
          isPaused = !isPaused;
          pauseBtn.textContent = isPaused ? "Продолжить" : "Пауза";
          if (isPaused) setHint("Пауза включена", false);
          else setHint("Игра продолжена", false);
        }, false);
        cheatBtn.addEventListener("click", function () {
          if (!gameStarted) return;
          tryActivateCheat();
        }, false);
        startGameBtn.addEventListener("click", startGameSession, false);
        startNameInput.addEventListener("keydown", function (event) {
          if ((event.key || "").toLowerCase() === "enter") startGameSession();
        }, false);

        try {
          var i;
          for (i = 0; i < dirButtons.length; i += 1) bindDirButton(dirButtons[i]);
          loadPlayerName();
          statusTextEl.textContent = "Статус: Введи имя для старта";
          statusTextEl.style.color = "#ffd37a";
          fetchLeaderboard();
          window.requestAnimationFrame(loop);
        } catch (err) {
          showFatal(err && err.message ? err.message : "unknown");
        }
      })();
    </script>
  </body>
</html>
